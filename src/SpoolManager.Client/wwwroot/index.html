<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>SpoolHero – Filament Management for 3D Printers</title>
    <meta name="description" content="SpoolHero is the free solution for managing 3D printing filament spools. RFID tracking, material database, team projects, dryer monitoring and more." />
    <meta name="keywords" content="SpoolHero, Filament, 3D printing, spool, RFID, OpenSpool, filament management, 3D Printer, Filament Manager" />
    <meta name="author" content="Phillip Weitkamp" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="__ORIGIN__/" />

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="__ORIGIN__/" />
    <meta property="og:title" content="SpoolHero – Filament Management for 3D Printers" />
    <meta property="og:description" content="Free filament management with RFID tracking, material database, team projects and dryer monitoring." />
    <meta property="og:image" content="__ORIGIN__/api/public/og-image" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="de_DE" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SpoolHero – Filament Management for 3D Printers" />
    <meta name="twitter:description" content="Free filament management with RFID tracking, material database, team projects and dryer monitoring." />
    <meta name="twitter:image" content="__ORIGIN__/api/public/og-image" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "SpoolHero",
      "description": "Self-hosted filament management for 3D printers. RFID tracking (OpenSpool), material database, team projects, dryer monitoring.",
      "applicationCategory": "UtilitiesApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "EUR"
      },
      "author": {
        "@type": "Person",
        "name": "Phillip Weitkamp",
        "email": "info@spoolhero.com"
      }
    }
    </script>

    <base href="/" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" href="/api/public/favicon" />
    <link href="SpoolManager.Client.styles.css" rel="stylesheet" />
</head>

<body>
    <!-- Skip to main content for screen readers -->
    <a href="#main-content" class="visually-hidden-focusable position-absolute top-0 start-0 p-2 bg-primary text-white" style="z-index:9999">
        Zum Hauptinhalt springen
    </a>

    <div id="app" role="main">
        <div class="d-flex justify-content-center align-items-center vh-100">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">SpoolHero wird geladen…</span>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui" class="alert alert-danger fixed-bottom m-3 d-none" role="alert">
        Ein unerwarteter Fehler ist aufgetreten.
        <a href="" class="alert-link">Neu laden</a>
        <button type="button" class="btn-close float-end" data-bs-dismiss="alert" aria-label="Schließen"></button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function spoolHeroSetFavicon(dataUrl) {
            var link = document.querySelector("link[rel='icon']");
            if (!link) { link = document.createElement('link'); link.rel = 'icon'; document.head.appendChild(link); }
            link.href = dataUrl;
        }
    </script>
    <script src="js/nfc.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/clipboard.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
