name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  version:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
      pull-requests: read
    outputs:
      version: ${{ steps.bump.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get merged PR labels
        id: labels
        run: |
          PR=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/pulls | jq -r '.[0] // empty')
          if [ -z "$PR" ]; then
            echo "bump=patch" >> $GITHUB_OUTPUT
          else
            LABELS=$(echo "$PR" | jq -r '[.labels[].name] | join(",")' )
            if echo "$LABELS" | grep -q "major"; then
              echo "bump=major" >> $GITHUB_OUTPUT
            elif echo "$LABELS" | grep -q "minor"; then
              echo "bump=minor" >> $GITHUB_OUTPUT
            else
              echo "bump=patch" >> $GITHUB_OUTPUT
            fi
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Bump version
        id: bump
        run: |
          CURRENT=$(cat VERSION | tr -d '[:space:]')
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)

          case "${{ steps.labels.outputs.bump }}" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            *)     PATCH=$((PATCH+1)) ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "$NEW_VERSION" > VERSION
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit and tag
        run: |
          NEW_VERSION="${{ steps.bump.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          MAIN_SHA=$(gh api repos/${{ github.repository }}/git/ref/heads/main -q '.object.sha')
          TREE_SHA=$(gh api repos/${{ github.repository }}/git/commits/${MAIN_SHA} -q '.tree.sha')

          BLOB_SHA=$(gh api repos/${{ github.repository }}/git/blobs \
            -X POST -f encoding=utf-8 -f content="${NEW_VERSION}" -q '.sha')

          NEW_TREE=$(gh api repos/${{ github.repository }}/git/trees \
            -X POST --jq '.sha' \
            --input - <<PAYLOAD
          {"base_tree":"${TREE_SHA}","tree":[{"path":"VERSION","mode":"100644","type":"blob","sha":"${BLOB_SHA}"}]}
          PAYLOAD
          )

          NEW_COMMIT=$(gh api repos/${{ github.repository }}/git/commits \
            -X POST --jq '.sha' \
            --input - <<PAYLOAD
          {"message":"chore: release v${NEW_VERSION} [skip ci]","tree":"${NEW_TREE}","parents":["${MAIN_SHA}"]}
          PAYLOAD
          )

          gh api repos/${{ github.repository }}/git/refs/heads/main \
            -X PATCH -f sha="$NEW_COMMIT" -f force=true

          gh api repos/${{ github.repository }}/git/refs \
            -X POST -f ref="refs/tags/v${NEW_VERSION}" -f sha="$NEW_COMMIT" 2>/dev/null || \
          gh api repos/${{ github.repository }}/git/refs/tags/v${NEW_VERSION} \
            -X PATCH -f sha="$NEW_COMMIT" -f force=true
        env:
          GH_TOKEN: ${{ github.token }}

  get-version:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    outputs:
      version: ${{ steps.read.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: read
        run: echo "version=$(cat VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT

  build:
    runs-on: ubuntu-latest
    needs: [version, get-version]
    if: always() && !failure() && !cancelled()
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      artifact: ${{ steps.resolve.outputs.artifact }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Resolve version
        id: resolve
        run: |
          VERSION="${{ needs.version.outputs.version }}${{ needs.get-version.outputs.version }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "artifact=spoolhero-$VERSION.zip" >> $GITHUB_OUTPUT

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: |
          dotnet publish src/SpoolManager.Server/SpoolManager.Server.csproj \
            -c Release \
            -o ./publish \
            --no-self-contained

      - name: Create archive
        run: cd publish && zip -r ../${{ steps.resolve.outputs.artifact }} .

      - uses: actions/upload-artifact@v4
        with:
          name: spoolhero
          path: ${{ steps.resolve.outputs.artifact }}
          retention-days: 7

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: always() && !failure() && !cancelled()

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: spoolhero

      - name: Stop service
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: systemctl stop spoolhero || true

      - name: Upload archive
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "${{ needs.build.outputs.artifact }}"
          target: "/tmp/"

      - name: Deploy and start
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            rm -rf /opt/spoolhero
            mkdir -p /opt/spoolhero
            unzip /tmp/${{ needs.build.outputs.artifact }} -d /opt/spoolhero
            rm /tmp/${{ needs.build.outputs.artifact }}
            cp /opt/appsettings.json /opt/spoolhero/appsettings.json
            chown -R www-data:www-data /opt/spoolhero
            systemctl start spoolhero

  release:
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: always() && !failure() && !cancelled()
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: spoolhero

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: SpoolHero v${{ needs.build.outputs.version }}
          body: |
            **Setup:** Download the zip, extract to `/opt/spoolhero`, place your `appsettings.json` and start the service.
            See [INSTALL.md](https://github.com/${{ github.repository }}/blob/main/INSTALL.md) for the full guide.
          files: ${{ needs.build.outputs.artifact }}
          fail_on_unmatched_files: true
